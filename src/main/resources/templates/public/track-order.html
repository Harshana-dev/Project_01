<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Track Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: nav"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="text-center mb-4">Track Your Order</h1>

            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <div class="card shadow-sm p-4">
                <form th:action="@{/track}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Order ID:</label>
                        <input type="number" name="orderId" class="form-control" placeholder="Enter Order ID" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number:</label>
                        <input type="text" name="phone" class="form-control" placeholder="Enter Phone Number" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Track Order</button>
                </form>
            </div>

            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none">← Back to Home</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
