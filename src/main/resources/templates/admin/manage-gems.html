<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Gems</title>
</head>
<body>

<h1>Gems</h1>

<!-- ✅ messages -->
<div th:if="${param.success == 'deleted'}" style="color: green; margin-bottom: 10px;">
    Gem deleted successfully.
</div>

<div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
    Cannot delete this gem. It may be used in orders.
</div>

<a th:href="@{/admin/gems/add}">Add New Gem</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Carat</th>
        <th>Price</th>
        <th>Category</th>
        <th>Actions</th> <!-- ✅ added -->
    </tr>

    <tr th:each="g : ${gems}">
        <td th:text="${g.id}"></td>
        <td th:text="${g.name}"></td>
        <td th:text="${g.carat}"></td>
        <td th:text="${g.price}"></td>
        <td th:text="${g.category.name}"></td>

        <td>
            <a th:href="@{'/admin/gems/edit/' + ${g.id}}">Edit</a>
            |
            <a th:href="@{'/admin/gems/delete/' + ${g.id}}"
               onclick="return confirm('Are you sure you want to delete this gem?');">
                Delete
            </a>
        </td>
    </tr>
</table>

<a th:href="@{/admin/dashboard}">Back</a>

</body>
</html>
