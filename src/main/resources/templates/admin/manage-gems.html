<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Gems</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Gems</h1>

    <div th:if="${param.success == 'deleted'}" class="alert alert-success">
        Gem deleted successfully.
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Cannot delete this gem. It may be used in orders.
    </div>

    <a th:href="@{/admin/gems/add}" class="btn btn-primary mb-3">Add New Gem</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Carat</th>
            <th>Price</th>
            <th>Category</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g : ${gems}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.name}"></td>
            <td th:text="${g.carat}"></td>
            <td th:text="${g.price}"></td>
            <td th:text="${g.category?.name}"></td>

            <td>
                <a th:href="@{'/admin/gems/edit/' + ${g.id}}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="@{'/admin/gems/delete/' + ${g.id}}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure you want to delete this gem?');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/admin/dashboard}" class="btn btn-secondary mt-3">Back</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
