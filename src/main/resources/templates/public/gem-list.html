<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gem Store</title>
</head>
<body>

<h1>Available Gems</h1>


<form method="get" th:action="@{/}" style="border:1px solid #ccc; padding:10px; margin-bottom:15px;">
    <label>Category:</label>
    <select name="categoryId">
        <option value="">All</option>
        <option th:each="c : ${categories}"
                th:value="${c.id}"
                th:text="${c.name}"
                th:selected="${categoryId != null and categoryId == c.id}">
        </option>
    </select>

    <br/><br/>

    <label>Min Price:</label>
    <input type="number" step="0.01" name="minPrice" th:value="${minPrice}" />

    <label>Max Price:</label>
    <input type="number" step="0.01" name="maxPrice" th:value="${maxPrice}" />

    <br/><br/>

    <label>Min Carat:</label>
    <input type="number" step="0.01" name="minCarat" th:value="${minCarat}" />

    <label>Max Carat:</label>
    <input type="number" step="0.01" name="maxCarat" th:value="${maxCarat}" />

    <br/><br/>

    <button type="submit">Filter</button>
    <a th:href="@{/}">Reset</a>
</form>

<div th:each="g : ${gems}" style="border:1px solid black; padding:10px; margin:10px;">

    <h3 th:text="${g.name}"></h3>

    <img th:if="${g.image1 != null}"
         th:src="@{'/uploads/' + ${g.image1}}"
         width="200"/>

    <p>Carat: <span th:text="${g.carat}"></span></p>
    <p>Price: Rs <span th:text="${g.price}"></span></p>

    <a th:href="@{'/gem/' + ${g.id}}">View Details</a>

</div>

</body>
</html>
