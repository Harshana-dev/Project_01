<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Order Status</title></head>
<body>
<h2>Order Status</h2>

<p>Order ID: <b th:text="${order.id}"></b></p>
<p>Status: <b th:text="${order.orderStatus}"></b></p>
<p>Paid: <b th:text="${order.paid}"></b></p>
<p th:if="${order.paymentId != null}">Payment ID: <b th:text="${order.paymentId}"></b></p>

<a href="/">Back to Home</a>
</body>
</html>
