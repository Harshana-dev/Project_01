<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: nav"></div>

<div class="container mt-4">

    <h1 class="mb-4">Your Cart</h1>

    <table class="table table-bordered table-striped" th:if="${cart != null and !cart.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Gem</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="i : ${cart}">
            <td th:text="${i.gem.name}"></td>
            <td th:text="${i.quantity}"></td>
            <td th:text="${i.gem.price}"></td>
            <td th:text="${i.gem.price * i.quantity}"></td>
            <td>
                <a th:href="@{'/cart/remove/' + ${i.gem.id}}" class="btn btn-danger btn-sm">Remove</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${cart == null or cart.isEmpty()}" class="alert alert-info">
        Cart is empty.
    </div>

    <h3 class="mt-4">Total: Rs <span th:text="${total}"></span></h3>

    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Continue Shopping</a>
        <a th:href="@{/checkout}" class="btn btn-success">Checkout</a>
        <a th:href="@{/cart/clear}" class="btn btn-outline-danger">Clear Cart</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
