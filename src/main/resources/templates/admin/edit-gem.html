<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Gem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Edit Gem: <span th:text="${gem.name}"></span></h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/gems/edit}" method="post" enctype="multipart/form-data">

                        <input type="hidden" name="id" th:value="${gem.id}" />

                        <div class="mb-3">
                            <label class="form-label">Gem Name:</label>
                            <input type="text" name="name" class="form-control" th:value="${gem.name}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category:</label>
                                <select name="categoryId" class="form-select" required>
                                    <option th:each="c : ${categories}"
                                            th:value="${c.id}"
                                            th:text="${c.name}"
                                    th:selected="${c.id == gem.category?.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Price (Rs):</label>
                                <input type="number" step="0.01" name="price" class="form-control" th:value="${gem.price}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Carat:</label>
                                <input type="number" step="0.01" name="carat" class="form-control" th:value="${gem.carat}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description:</label>
                            <textarea name="description" class="form-control" rows="3" th:text="${gem.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Current Image:</label><br>
                            <img th:if="${gem.image1 != null}" th:src="@{'/uploads/' + ${gem.image1}}" width="100" class="img-thumbnail mb-2">
                            <input type="file" name="gemImage" class="form-control" accept="image/*">
                            <small class="text-muted">Leave empty to keep current image.</small>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">Update Gem</button>
                            <a th:href="@{/admin/gems}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
