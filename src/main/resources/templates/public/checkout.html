<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: nav"></div>

<div class="container mt-4">

    <h1 class="mb-4">Checkout</h1>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="card p-4 mb-4">
        <h3>Total: Rs <span th:text="${total}"></span></h3>
    </div>

    <div class="card p-4">
        <form th:action="@{/checkout}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Name:</label>
                <input type="text" name="customerName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone:</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" name="customerEmail" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Delivery Address:</label>
                <textarea name="deliveryAddress" class="form-control" rows="3" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Payment Method:</label>
                <select name="paymentMethod" id="paymentMethod" class="form-select" onchange="toggleReceipt()">
                    <option value="COD">Cash on Delivery</option>
                    <option value="BANK_TRANSFER">Bank Transfer</option>
                    <option value="CARD">Card (Tomorrow)</option>
                </select>
            </div>

            <div id="receiptDiv" class="mb-3" style="display:none;">
                <label class="form-label">Upload Bank Receipt:</label>
                <input type="file" name="receipt" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary w-100">Place Order</button>
        </form>
    </div>
</div>

<script>
    function toggleReceipt() {
        const method = document.getElementById('paymentMethod').value;
        document.getElementById('receiptDiv').style.display =
            (method === 'BANK_TRANSFER') ? 'block' : 'none';
    }
    // Run once on load to check initial state
    toggleReceipt();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
