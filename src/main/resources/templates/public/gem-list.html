<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gem Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: nav"></div>

<div class="container mt-4">

    <h3 class="mb-3">Available Gems</h3>

    <div class="card p-3 mb-4">
        <form method="get" th:action="@{/}">
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label">Category:</label>
                    <select name="categoryId" class="form-select">
                        <option value="">All</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${categoryId != null and categoryId == c.id}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Min Price:</label>
                    <input type="number" step="0.01" name="minPrice" th:value="${minPrice}" class="form-control" />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max Price:</label>
                    <input type="number" step="0.01" name="maxPrice" th:value="${maxPrice}" class="form-control" />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Min Carat:</label>
                    <input type="number" step="0.01" name="minCarat" th:value="${minCarat}" class="form-control" />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max Carat:</label>
                    <input type="number" step="0.01" name="maxCarat" th:value="${maxCarat}" class="form-control" />
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">Filter</button>
                </div>
            </div>
        </form>
        <div class="mt-2">
            <a th:href="@{/}" class="btn btn-outline-secondary btn-sm">Reset</a>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4" th:each="g : ${gems}">
            <div class="card h-100">
                <img th:if="${g.image1 != null}"
                     th:src="@{'/uploads/' + ${g.image1}}"
                     class="card-img-top"
                     style="height:220px;object-fit:cover;"
                     alt="Gem Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${g.name}"></h5>
                    <p class="card-text mb-1">Carat: <span th:text="${g.carat}"></span></p>
                    <p class="card-text">Price: Rs <span th:text="${g.price}"></span></p>
                    <a class="btn btn-primary w-100" th:href="@{'/gem/' + ${g.id}}">View Details</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
